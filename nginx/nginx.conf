events {
    worker_connections 1024;
}

http {
    # Custom log format including upstream response time
    log_format custom '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log custom;
    error_log  /var/log/nginx/error.log warn;

    # Tune proxy timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── US upstream group ────────────────────────────────────────────────────
    upstream us_backend {
        server backend-us:8000;
        server backend-eu:8000 backup;
    }

    # ── EU upstream group ────────────────────────────────────────────────────
    upstream eu_backend {
        server backend-eu:8000;
        server backend-us:8000 backup;
    }

    server {
        listen 80;
        server_name _;

        # ── US endpoint ──────────────────────────────────────────────────────
        location /us/ {
            proxy_pass         http://us_backend/;
            # Failover only on actual connection failures
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries    2;
            proxy_next_upstream_timeout  10s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Routed-Region   us;
        }

        # ── EU endpoint ──────────────────────────────────────────────────────
        location /eu/ {
            proxy_pass         http://eu_backend/;
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries    2;
            proxy_next_upstream_timeout  10s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Routed-Region   eu;
        }

        # ── Root health ───────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"nginx"}\n';
            add_header Content-Type application/json;
        }
    }
}
